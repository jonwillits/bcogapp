name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows a manual re-run from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-flight deploy finish rather than cancelling it half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 LTS: the build isn't version-sensitive and npm ci pins
          # everything from the committed lockfile.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (gate the deploy on the sim tests)
        run: npm run test

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
